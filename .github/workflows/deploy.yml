name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /opt/neoteric-app
            cd /opt/neoteric-app
            
            # Clone or pull the latest changes
            if [ ! -d ".git" ]; then
              git clone https://github.com/ayobamiblackforce-100/NeoCrypto.git .
            else
              git pull origin main
            fi
            
            # Start/Update the application
            docker compose up -d

server {
    # Listen to port 443 on both IPv4 and IPv6.
    listen 443 ssl;
    listen [::]:443 ssl;

    # Domain names this server should respond to.
    server_name neoteric.naija.ee;

    # Load the certificate files.
    ssl_certificate         /etc/letsencrypt/live/neoteric.naija.ee/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/neoteric.naija.ee/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/neoteric.naija.ee/chain.pem;

    # Load the Diffie-Hellman parameter.
    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
